name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Lint / Format / Types
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Build
        run: pnpm build

      - name: Run check (fmt + lint + typecheck)
        run: pnpm check

      - name: Validate published package (exports / types)
        run: pnpm check:package

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Build (snapshots load from dist)
        run: pnpm build

      - name: Run tests
        run: pnpm test

  changeset:
    name: Changeset
    # Renovate PRs are normally exempt, but oxc bumps (labeled `oxc-update`)
    # change the effective rule set, so they must carry a changeset documenting
    # the new/changed rules.
    if: >-
      github.head_ref != 'changeset-release/main' &&
      (github.actor != 'renovate[bot]' ||
       contains(github.event.pull_request.labels.*.name, 'oxc-update'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Verify a changeset is present
        run: pnpm exec changeset status --since=origin/main
